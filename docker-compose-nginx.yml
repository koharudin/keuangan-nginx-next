services:
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "2022:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./be:/var/www/laravel
    depends_on:
      - laravel
      - next
    networks:
      - appnet

  laravel:
    build:
      context: .
      dockerfile: php-fpm.Dockerfile
    container_name: laravel
    working_dir: /var/www/laravel
    volumes:
      - ./be:/var/www/laravel
    networks:
      - appnet

  next:
    image: node:20
    container_name: nextjs
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    networks:
      - appnet

networks:
  appnet: